<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RocksPersona</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ----------------------------- */
/* BASICS 		         */
/* ----------------------------- */
body{
font-family: 'Nunito', sans-serif;
text-align:center;
padding:30px;
background: #ffc69d;

display: flex;                 /* Center the card horizontally and vertically */
justify-content: center;       
align-items: center;           
height: 100vh;                 /* Full screen height so card is vertically centered */
margin: 0;                     /* Remove default margin */
}


/* ----------------------------- */
/* CARD STYLE		         */
/* ----------------------------- */
.card{
    background: linear-gradient(
    135deg,
    #cfcfcf,
    #f5f5f5,
    #b5b5b5,
    #ffffff,
    #a8a8a8
    );
    width: 90vh;      /* consistent card width */
    height: 85vh;      /* 85% of screen height */
    max-width:500px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    text-align:center;
}
.inner-card{
    background:#f3e0c6;
    height:100%;
    width:100%;
    padding: 2% 3%;
    display:flex;
    flex-direction:column;
    gap:0px;
    box-sizing:border-box;      /* prevents border from resizing layout */
}


/* ----------------------------- */
/* QUESTION #		         */
/* ----------------------------- */
#question-number{
    font-weight:700;
    font-size:20px;
    margin-top:0px;
    margin-bottom:0px;
    text-align:left;
    width:100%;
    padding-left:2%
}

/* ----------------------------- */
/* IMAGE		         */
/* ----------------------------- */
#question-image{
    width:100%;
    height:40%;
    object-fit:cover;
    display:block;
    margin-bottom:0px;
}

/* ----------------------------- */
/* TEXT			         */
/* ----------------------------- */
#text-box {
    background: #fdf5e6;      /* very light beige, slightly lighter than inner card */
    padding: 1%;
    display: flex;
    flex-direction: column;
    gap: 1%;
    margin-top:0;
    margin-bottom: 1%;
    flex-grow: 1;
}
#question{
    font-weight:700;
    font-size:20px;
    margin-top: 5%;
    margin-bottom: 5%;
    margin-left: 5%;
    margin-right: 5%;
}
#answers{
    display: flex;
    flex-direction: column;
    gap: 1%
}

button{
    display:block;
    width:80%;
    max-width:500px;
    margin:10px auto;
    padding:3% 7%;
    font-weight:600;
    font-size:14px;
    background:#fcbe74;
    color:black;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    white-space: normal;      /* allow text to wrap */
    word-wrap: break-word;    /* break long words if needed */
}

/*
button:hover {
    background: #824700;
    color: white;
}
*/







/* Top block */
.results-top-block {
    background: #fcbe74;
    border-radius: 15px;
    padding: 1%;
    margin-top:3%;
    margin-bottom: 3%;
    font-weight: 600;
    font-size: 12px;
    text-align: center;
    white-space: pre-wrap;
    line-height:1.5;
}
/* Container for 6 blocks in 2 columns */
.results-bottom-container {
    display: grid;
    grid-template-columns: 1fr 1fr;  /* 2 columns */
    grid-auto-rows: 1fr;             /* make each row take equal vertical space */
    gap: 1%;
    flex-shrink: 1;              
    flex-grow: 1;  
    min-height: 0;  
}
/* Individual bottom blocks */
.results-bottom-block {
    background: #fcbe74;
    border-radius: 15px;
    padding: 1%;
    font-weight: 600;
    font-size: 11px;
    text-align: center;
    margin-bottom:3%;
    overflow: hidden;  
    white-space: pre-wrap;
    line-height: 1.5;
}



#copyright {
    font-size: 14px;
    font-weight: 600;
    margin-top: auto;      /* --- pushes it to bottom */
    padding-bottom: 0%;    /* --- small space above trim */
}





</style>
</head>




<!-- --------------------------BODY-------------------------- -->
<body>
<div class="card">

<div class="inner-card">

<div id="question-number"></div>



<img id="question-image" src="" alt="Question Image">


<div id="text-box">
  <div id="question"></div>
  <div id="answers"></div>
</div>

<div id="copyright">@Copyright 2026 Zack Chen - Baetheon Technologies</div>

</div>
</div>

<!-- --------------------------SCRIPT-------------------------- -->
<script>
const questions = [

]

},

image:"Q11.gif",
answers:[
{ text:"Thanks for saving me!", type:"F"},

]
},

{ text:"It might be fun to hang out here for a while!", type:"E"},
{ text:"*break the glass*", type:"I"}

image:"dark.png",
answers:[
{ text:"RESULTS!", type:"X"}
]

/* ----------------------------- */
/* TRACK QUIZ STATE              */
/* ----------------------------- */
let currentQuestion = 0
let scores = {
I:0,
E:0,
N:0,
S:0,
T:0,
F:0,
J:0,
P:0
}


/* ----------------------------- */
/* DISPLAY QUESTION              */
/* Updates the card with         */
/* question text, image, answers */
/* ----------------------------- */
function showQuestion(){
document.getElementById("copyright").style.display = "block"
let q = questions[currentQuestion]
document.getElementById("question-number").innerText = "Q" + (currentQuestion+1) + "/12"

document.getElementById("question").innerText = q.question	/* Update question text */
document.getElementById("question-image").src = q.image		/* Update image */
let answersDiv = document.getElementById("answers")		/* Get answers container */
answersDiv.innerHTML = ""					/* Clear previous buttons */
q.answers.forEach(a=>{						/* Create a button for each answer */
let btn = document.createElement("button")
btn.innerText = a.text

if(currentQuestion === 12) {
qNumDiv = document.getElementById("question-number")
qNumDiv.innerText = "???"
qNumDiv.style.textAlign = "center"
qNumDiv.style.fontSize = "32px"
qNumDiv.style.fontWeight = "900"    
qNumDiv.style.marginBottom = "2%"
btn.style.fontSize = "20px"
btn.style.fontWeight = "800"
}

btn.onclick = function(){
scores[a.type]++		/* Add score for selected answer */
currentQuestion++		/* Move to next question */
if(currentQuestion >= questions.length){
showResult()
}else{
showQuestion()
}
}

answersDiv.appendChild(btn)
})
}


/* ----------------------------- */
/* SHOW FINAL RESULT             */
/* ----------------------------- */

let result = ""

}
let rockText1 = rockTexts1[result]
let rockTexts2 = {

let rockText5 = rockTexts5[result]

//document.getElementById("question-number").innerText = rock
qNumDiv = document.getElementById("question-number")

    let block = document.createElement("div")        // --- NEW
    block.className = "results-bottom-block"        // --- NEW
    block.innerText = detailTexts[i]   // <-- THIS is the key line

}

textBox.appendChild(bottomContainer)                // --- NEW

}

</script>
</body>
</html>
